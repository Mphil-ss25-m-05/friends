<!DOCTYPE html>
<html>

<head>
    <title>Birthday Wishes</title>
</head>

<body>

    <h1>🎂 Birthday Wishes 🎉</h1>

    <p>Enter your name:</p>

    <input type="text" id="name">

    <button onclick="checkName()">
        Submit
    </button>

    <h2 id="message"></h2>

    <script>

        function checkName() {

            let personName =
                document.getElementById("name").value;

            if (
                personName == "Areesha" ||
                personName == "areesha"
            ) {

                document.getElementById("message").innerHTML =
                    "🎉 Happy Birthday, " +
                    personName +"🎉 My love " +

                    "! 🎂";

            }

            else {

                document.getElementById("message").innerHTML =
                    "You deserve better 🙂";

            }

        }

    </script>

</body>

</html>
