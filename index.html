<body>

    <h1>📢 Hiring Update</h1>

    <p>Enter your name:</p>

    <input type="text" id="name">

    <button onclick="checkHire()">Submit</button>

    <h2 id="message"></h2>

    <script>

        function checkHire() {

            let name = document.getElementById("name").value;

            // Convert input to lowercase for case-insensitive matching
            name = name.toLowerCase();

            if (
                name == "ahmed" ||
                name == "haseeb" ||
                name == "usama" ||
                name == "saif" ||
                name == "yasir"
            ) {

                document.getElementById("message").innerHTML =
                    "🎉 Congratulations you are hired as an accountant in mehmood booti khula drwaza";

            }

            else {

                document.getElementById("message").innerHTML =
                    "Nikal dallay apna naam likh";

            }

        }

    </script>
